<style>
/* ============================================================
   SFC Report System — design tokens
   Grounded in the association's identity: the palm/friendship
   green from the logo, warm sand paper, ink for text.
   ============================================================ */
:root{
  --green:#3f8f52;          /* SFC primary green */
  --green-deep:#2c6b3c;
  --green-soft:#e8f2ea;
  --green-line:#cfe4d4;
  --sand:#f6f4ee;           /* paper */
  --card:#ffffff;
  --ink:#20302a;
  --ink-soft:#5c6b63;
  --gold:#c79a3d;           /* accent for numbers/awards */
  --blue:#2f6f9f;           /* comms accent */
  --danger:#c0492f;
  --line:#e4e6e1;
  --radius:14px;
  --shadow:0 1px 2px rgba(32,48,42,.06),0 8px 24px rgba(32,48,42,.06);
  --font: "Segoe UI", "Tahoma", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--sand);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
body[dir="ltr"]{text-align:left}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
h1,h2,h3{line-height:1.2;font-weight:800}

/* ---------- layout shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex-shrink:0;background:var(--green-deep);
  color:#eaf3ec;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .logo{display:flex;align-items:center;gap:11px}
.brand .mark{width:38px;height:38px;flex-shrink:0}
.brand h1{font-size:15px;color:#fff;letter-spacing:.2px}
.brand .sub{font-size:11px;color:#a9cdb2;margin-top:2px;font-weight:600;letter-spacing:.4px}
.nav{padding:12px 10px;flex:1}
.nav .group-label{font-size:10.5px;color:#84b291;text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px;font-weight:700}
.nav button{
  display:flex;align-items:center;gap:10px;width:100%;text-align:inherit;
  background:transparent;border:0;color:#d3e6d8;padding:9px 12px;
  border-radius:9px;font-size:13.5px;font-weight:600;margin-bottom:2px;transition:.15s;
}
.nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.nav button.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav .ico{width:18px;height:18px;flex-shrink:0;opacity:.9}
.sidebar-foot{padding:14px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#9ec3a6}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--card);border-bottom:1px solid var(--line);
  padding:14px 26px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:20;
}
.topbar .page-title{font-size:19px;font-weight:800}
.topbar .spacer{flex:1}
.month-pick{display:flex;align-items:center;gap:8px;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:5px 10px}
.month-pick label{font-size:12px;color:var(--ink-soft);font-weight:700}
.month-pick select{border:0;background:transparent;font-size:13px;font-weight:700;color:var(--ink);outline:none}
.lang-toggle{display:flex;background:var(--sand);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.lang-toggle button{padding:6px 12px;border:0;background:transparent;font-size:12px;font-weight:700;color:var(--ink-soft)}
.lang-toggle button.on{background:var(--green);color:#fff}
.content{padding:26px;max-width:1180px;width:100%;margin:0 auto}

/* ---------- buttons ---------- */
.btn{border:0;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-deep)}
.btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--green);color:var(--green-deep)}
.btn-gold{background:var(--gold);color:#fff}
.btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid transparent;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700}
.btn-danger-ghost:hover{background:#fbeae6}
.btn-sm{padding:6px 12px;font-size:12.5px}

/* ---------- cards / stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--green)}
.stat.g::before{background:var(--gold)} .stat.b::before{background:var(--blue)}
.stat .k{font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-.5px}
.stat .v small{font-size:13px;color:var(--ink-soft);font-weight:600}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.panel-head h3{font-size:15px}
.panel-head .count{background:var(--green-soft);color:var(--green-deep);font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:20px}
.panel-head .spacer{flex:1}
.panel-body{padding:0}
.panel-pad{padding:18px}

/* ---------- table ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--green-soft);color:var(--green-deep);font-weight:800;font-size:12px;padding:10px 12px;text-align:inherit;white-space:nowrap;border-bottom:1px solid var(--green-line)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.tbl tr:last-child td{border-bottom:0}
.tbl tr:hover td{background:#fafbfa}
.tbl .num{color:var(--ink-soft);font-variant-numeric:tabular-nums;width:38px}
.tbl .actions{white-space:nowrap;text-align:end;width:1%}
.chip{display:inline-block;background:var(--green-soft);color:var(--green-deep);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin:1px}
.chip.b{background:#e7f0f7;color:var(--blue)}
.chip.g{background:#f6efdb;color:#9a7420}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft)}
.empty svg{opacity:.35;margin-bottom:10px}
.empty p{font-size:13.5px}

/* ---------- forms ---------- */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13.5px;
  background:var(--card);color:var(--ink);outline:none;transition:.15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.field textarea{resize:vertical;min-height:64px}
.form-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}

/* ---------- modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(28,40,34,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-head h3{font-size:16px}
.modal-head .x{margin-inline-start:auto;background:var(--sand);border:0;width:30px;height:30px;border-radius:8px;font-size:18px;color:var(--ink-soft)}
.modal-body{padding:22px}

/* ---------- toast ---------- */
.toast{position:fixed;bottom:22px;inset-inline-end:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transform:translateY(10px);transition:.25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.ok{background:var(--green-deep)}
.toast.err{background:var(--danger)}

/* ---------- page utilities ---------- */
.page{display:none}
.page.active{display:block}
.page-intro{color:var(--ink-soft);font-size:13.5px;margin-bottom:20px;max-width:680px}
.section-add{display:flex;justify-content:flex-end;margin-bottom:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:1000px){.two-col{grid-template-columns:1fr}}

/* ---------- report view (Canva-like) ---------- */
.report-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.report-toolbar .spacer{flex:1}
.report-sheet{background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow);padding:0;overflow:hidden}
.rep-section{padding:26px 30px;border-bottom:8px solid var(--sand)}
.rep-section:last-child{border-bottom:0}
.rep-title{text-align:center;color:var(--green-deep);margin-bottom:4px;font-size:26px}
.rep-sub{text-align:center;color:var(--ink-soft);font-size:15px;font-weight:700;margin-bottom:20px}
.rep-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
.rep-tbl th{background:var(--green-soft);color:var(--green-deep);border:1px solid var(--green-line);padding:9px;font-weight:800}
.rep-tbl td{border:1px solid var(--line);padding:9px;text-align:center}
.rep-empty{text-align:center;color:#b7bdb8;font-size:13px;padding:16px}

/* ---------- responsive ---------- */
.menu-btn{display:none}
@media(max-width:860px){
  .sidebar{position:fixed;inset-inline-start:0;top:0;z-index:60;transform:translateX(-100%);transition:.25s}
  body[dir="rtl"] .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:none!important}
  .menu-btn{display:inline-flex}
  .form-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
  .backdrop.open{display:block}
}
@media print{
  .sidebar,.topbar,.report-toolbar,.no-print{display:none!important}
  .content{padding:0;max-width:none}
  .report-sheet{border:0;box-shadow:none}
  .rep-section{page-break-inside:avoid}
}
</style>

/* ---- cloud additions: login, avatar, status, admin ---- */
#root{min-height:100vh}
.setup-needed{max-width:520px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:34px;box-shadow:var(--shadow)}
.setup-needed h2{color:var(--green-deep);margin-bottom:10px}
.setup-needed p{color:var(--ink-soft);font-size:14px;line-height:1.7}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1200px 600px at 50% -10%, #e8f2ea, var(--sand))}
.login-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(32,48,42,.12);
  width:100%;max-width:400px;padding:34px 30px}
.login-brand{text-align:center;margin-bottom:24px}
.login-brand h1{font-size:20px;color:var(--ink);margin-top:12px}
.login-sub{font-size:10.5px;color:var(--green);font-weight:700;letter-spacing:1.2px;margin-top:6px}
.login-card .field{margin-bottom:14px}
.login-btn{width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:6px}
.login-err{color:var(--danger);font-size:13px;font-weight:600;min-height:18px;text-align:center;margin:4px 0}
.login-lang{display:flex;gap:8px;justify-content:center;margin-top:18px}
.login-lang button{background:transparent;border:1px solid var(--line);border-radius:8px;padding:5px 14px;font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.login-lang button.on{background:var(--green);color:#fff;border-color:var(--green)}

.avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.btn-signout{width:100%;background:rgba(255,255,255,.1);color:#eaf3ec;border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:8px;font-size:12.5px;font-weight:700;cursor:pointer}
.btn-signout:hover{background:rgba(255,255,255,.18)}

.locked-banner{background:#f6efdb;border:1px solid #e6d09a;color:#8a6a1e;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-weight:700;font-size:13.5px}
.status-meta{display:flex;gap:16px;font-size:12px;color:var(--ink-soft);margin-bottom:14px;flex-wrap:wrap}
.pill{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:800}
.pill-draft{background:#eef0ed;color:#5c6b63}
.pill-submitted{background:#f6efdb;color:#9a7420}
.pill-approved{background:var(--green-soft);color:var(--green-deep)}
</style>

/* ---------------- DATA LAYER (Supabase) ----------------
   In-memory CACHE mirrors the DB for synchronous rendering; every
   mutation writes to Supabase then refreshes the cache. entries table
   stores {section, entry_date, data{}}, so we flatten to Stage-1 shape. */
const CACHE = { daily:[],letters:[],meetings:[],media:[],finance:[],initiatives:[],quality:[], status:{} };

const DB = {
  all(tbl){ return CACHE[tbl]||[]; },
  async refresh(){
    const { data, error } = await sb.from('entries').select('*').order('entry_date',{ascending:false});
    if(error){ console.error(error); toast(error.message,'err'); return; }
    for(const k of ['daily','letters','meetings','media','finance','initiatives','quality']) CACHE[k]=[];
    (data||[]).forEach(row=>{
      const rec = { id:row.id, date:row.entry_date, _by:row.created_name||'', _byId:row.created_by, ...row.data };
      if(CACHE[row.section]) CACHE[row.section].push(rec);
    });
    // status
    const st = await sb.from('report_status').select('*');
    CACHE.status={}; (st.data||[]).forEach(s=>CACHE.status[s.month]=s);
  },
  async upsert(tbl,rec){
    const {id,date,_by,_byId,...data}=rec;
    if(id){
      const { error } = await sb.from('entries').update({entry_date:date,data,updated_at:new Date().toISOString()}).eq('id',id);
      if(error) return toast(error.message,'err'),false;
      await audit('update',tbl,id);
    } else {
      const { data:ins, error } = await sb.from('entries').insert({
        section:tbl, entry_date:date, data, created_by:ME.id, created_name:ME.name
      }).select().single();
      if(error) return toast(error.message,'err'),false;
      await audit('insert',tbl,ins.id);
    }
    await DB.refresh(); return true;
  },
  async remove(tbl,id){
    const { error } = await sb.from('entries').delete().eq('id',id);
    if(error) return toast(error.message,'err'),false;
    await audit('delete',tbl,id); await DB.refresh(); return true;
  },
  status(month){ return CACHE.status[month]?.status || 'draft'; },
  statusRec(month){ return CACHE.status[month]||null; },
  async setStatus(month,status){
    const patch = {month,status,updated_at:new Date().toISOString()};
    if(status==='submitted'){ patch.submitted_by=ME.id; patch.submitted_at=new Date().toISOString(); }
    if(status==='approved'){ patch.approved_by=ME.id; patch.approved_at=new Date().toISOString(); }
    const { error } = await sb.from('report_status').upsert(patch,{onConflict:'month'});
    if(error) return toast(error.message,'err'),false;
    await audit(status==='submitted'?'submit':status==='approved'?'approve':'reopen',null,null,month);
    await DB.refresh(); return true;
  }
};
async function audit(action,section,entryId,detail){
  try{ await sb.from('audit_log').insert({actor_id:ME.id,actor_name:ME.name,action,section,entry_id:entryId||null,detail:detail||null}); }
  catch(e){ /* non-fatal */ }
}

function allMonths(){
  const s=new Set();
  ['daily','letters','meetings','media','finance','initiatives','quality']
    .forEach(k=>CACHE[k].forEach(r=>{if(r.date)s.add(monthOf(r.date));}));
  Object.keys(CACHE.status).forEach(m=>s.add(m));
  return [...s].sort().reverse();
}

    return arr.map(c=>`<span class="chip b">${c}</span>`).join(' '); }

  return (r[col]!=null && r[col]!=='')? r[col] : '<span style="color:#c3c8c3">—</span>';
}

  if(col==='_summary') return t('f_details');
  const f = SECTIONS[tbl].fields.find(f=>f.k===col);
  return f? t(f.l) : col;
}

  const cols=sec.tableCols; const locked=isLocked();

        <button class="btn btn-ghost btn-sm" onclick="exportCsv('${tbl}')">${t('exportCsv')}</button></div>
      <div class="panel-body">
        ${rows.length? `<table class="tbl"><thead><tr><th class="num">#</th>
          ${cols.map(col=>`<th>${colLabel(tbl,col)}</th>`).join('')}<th>${t('by')}</th><th></th></tr></thead>
          <tbody>${rows.map((r,i)=>`<tr>
            <td class="num">${i+1}</td>
            ${cols.map(col=>`<td>${cellVal(tbl,col,r)}</td>`).join('')}
            <td style="font-size:11.5px;color:var(--ink-soft)">${r._by||''}</td>
            <td class="actions">${rowActions(tbl,r,locked)}</td></tr>`).join('')}
          </tbody></table>` :
        `<div class="empty"><p>${t('empty')}</p></div>`}
      </div>
    </div>`;
}
function rowActions(tbl,r,locked){
  if(locked) return '';
  let h='';
  if(canEditRow(r)) h+=`<button class="btn-danger-ghost" onclick="editRow('${tbl}','${r.id}')">${t('edit')}</button>`;
  if(ME.role==='admin') h+=`<button class="btn-danger-ghost" onclick="delRow('${tbl}','${r.id}')">${t('del')}</button>`;
  return h || `<span style="font-size:11px;color:#b7bdb8">${t('notYours')}</span>`;
}

  FORM_STATE={tbl,id:rec?rec.id:null};
  const sec=SECTIONS[tbl];
  document.getElementById('modalTitle').textContent=(rec?t('edit'):t('add'))+' · '+t(tbl);
  document.getElementById('modalBody').innerHTML=`<div class="form-grid" id="formGrid">
    ${sec.fields.map(f=>fieldHtml(f,rec)).join('')}</div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveForm()">${t('save')}</button></div>`;
  applyConditional(tbl,rec);
  document.getElementById('modalBg').classList.add('open');
}
function fieldHtml(f,rec){
  const v = rec ? (rec[f.k]??'') : (f.type==='date'? new Date().toISOString().slice(0,10):'');
  const full = (f.type==='text'&&['letterDetail','details','notes','recipient'].includes(f.k))||f.type==='multi';
  const wrap=c=>`<div class="field ${full?'full':''}" data-show="${f.show||''}"><label>${t(f.l)}${f.req?' *':''}</label>${c}</div>`;
  if(f.type==='select'){
    const opts=f.opts.map(o=>{const[val,lk]=o.includes('|')?o.split('|'):[o,null];
      return `<option value="${val}" ${v==val?'selected':''}>${lk?t(lk):o}</option>`;}).join('');
    return wrap(`<select data-f="${f.k}" onchange="applyConditional('${FORM_STATE.tbl}')"><option value="">—</option>${opts}</select>`);
  }
  if(f.type==='multi'){
    const arr=Array.isArray(v)?v:(v?[v]:[]);
    return wrap(`<div style="display:flex;flex-wrap:wrap;gap:6px">${f.opts.map(o=>`
      <label style="display:flex;align-items:center;gap:5px;font-weight:600;font-size:12.5px;background:var(--sand);padding:5px 9px;border-radius:8px;cursor:pointer">
      <input type="checkbox" data-multi="${f.k}" value="${o}" ${arr.includes(o)?'checked':''}> ${o}</label>`).join('')}</div>`);
  }
  const type=f.type==='number'?'number':(f.type==='date'?'date':'text');
  return wrap(`<input type="${type}" data-f="${f.k}" value="${String(v).replace(/"/g,'&quot;')}">`);
}
function applyConditional(tbl){
  const typeField=tbl==='finance'?'finType':(tbl==='initiatives'?'initType':null);
  if(!typeField) return;
  const cur=document.querySelector(`[data-f="${typeField}"]`)?.value||'';
  document.querySelectorAll('#formGrid .field[data-show]').forEach(el=>{
    const s=el.getAttribute('data-show'); el.style.display=(!s||s===cur)?'flex':'none'; });
}
async function saveForm(){
  const {tbl,id}=FORM_STATE; const sec=SECTIONS[tbl];
  const rec=id?{...DB.all(tbl).find(r=>r.id===id)}:{};
  for(const f of sec.fields){
    if(f.type==='multi') rec[f.k]=[...document.querySelectorAll(`[data-multi="${f.k}"]:checked`)].map(c=>c.value);
    else { const el=document.querySelector(`[data-f="${f.k}"]`);
      if(el) rec[f.k]= f.type==='number'? (el.value===''?'':Number(el.value)) : el.value; }
  }
  const miss=sec.fields.find(f=>f.req && (rec[f.k]===''||rec[f.k]==null));
  if(miss){ toast(t(miss.l),'err'); return; }
  document.getElementById('saveBtn').disabled=true;
  const ok=await DB.upsert(tbl,rec);
  if(ok){ closeModal(); toast(t('saved'),'ok'); renderMonthSel(); renderPage(); }
  else document.getElementById('saveBtn').disabled=false;
}

/* ---------------- DASHBOARD ---------------- */
function sum(a,f){return a.reduce((s,r)=>s+(Number(f(r))||0),0);}
function viewDashboard(){
  const daily=inMonth(DB.all('daily')), letters=inMonth(DB.all('letters')),
        meetings=inMonth(DB.all('meetings')), finance=inMonth(DB.all('finance'));
  const sales=finance.filter(r=>r.finType==='sale');
  const salesTotal=sum(sales,r=>(r.count||0)*(r.price||0));
  const benef=finance.filter(r=>r.finType==='metric'&&/مستفيد|benef/i.test(r.item||''));
  const reach=sum(daily,r=>r.count||0);
  const chan={}; daily.forEach(r=>{const a=Array.isArray(r.channel)?r.channel:(r.channel?[r.channel]:[]);
    a.forEach(c=>chan[c]=(chan[c]||0)+(Number(r.count)||1));});
  const prog={}; daily.forEach(r=>{if(r.program)prog[r.program]=(prog[r.program]||0)+(Number(r.count)||1);});
  const recent=DB.all('daily').slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6);
  return `
  <div class="stat-grid">
    ${stat('d_activities',daily.length,'')}${stat('d_reach',reach,'b')}
    ${stat('d_letters',letters.length,'')}${stat('d_meetings',meetings.length,'b')}
    ${stat('d_sales',salesTotal.toLocaleString(),'g')}
    ${stat('d_benef',sum(benef,r=>parseInt(r.value)||0),'g')}</div>
  <div class="two-col">
    <div class="panel"><div class="panel-head"><h3>${t('d_byChannel')}</h3></div><div class="panel-pad">${bar(chan)}</div></div>
    <div class="panel"><div class="panel-head"><h3>${t('d_byProgram')}</h3></div><div class="panel-pad">${bar(prog)}</div></div></div>
  <div class="panel"><div class="panel-head"><h3>${t('d_recent')}</h3></div><div class="panel-body">
    ${recent.length?`<table class="tbl"><thead><tr><th>${t('f_date')}</th><th>${t('f_program')}</th><th>${t('f_recipient')}</th><th>${t('f_channel')}</th><th>${t('by')}</th></tr></thead>
    <tbody>${recent.map(r=>`<tr><td>${r.date||''}</td><td>${r.program||''}</td><td>${r.recipient||''}</td><td>${cellVal('daily','channel',r)}</td><td style="font-size:11.5px;color:var(--ink-soft)">${r._by||''}</td></tr>`).join('')}</tbody></table>`:`<div class="empty"><p>${t('empty')}</p></div>`}
  </div></div>`;
}
function stat(k,v,c){return `<div class="stat ${c}"><div class="k">${t(k)}</div><div class="v">${v}</div></div>`;}
function bar(obj){
  const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(!e.length)return `<div class="empty" style="padding:20px"><p>${t('empty')}</p></div>`;
  const mx=Math.max(...e.map(x=>x[1]));
  return `<div style="display:flex;flex-direction:column;gap:9px">${e.map(([k,v])=>`
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:130px;font-size:12.5px;font-weight:600;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k}</div>
      <div style="flex:1;background:var(--sand);border-radius:6px;height:22px;overflow:hidden">
        <div style="width:${v/mx*100}%;height:100%;background:linear-gradient(90deg,var(--green),var(--green-deep));border-radius:6px"></div></div>
      <div style="width:34px;text-align:end;font-weight:800;font-size:13px">${v}</div></div>`).join('')}</div>`;
}

function rTbl(h,rows){ if(!rows.length)return `<div class="rep-empty">—</div>`;
  return `<table class="rep-tbl"><thead><tr><th>م</th>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead>
   <tbody>${rows.map((c,i)=>`<tr><td>${i+1}</td>${c.map(x=>`<td>${x??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
function statusPill(s){return `<span class="pill pill-${s}">${t('st_'+s)}</span>`;}

  </div>

    <div class="rep-section" style="text-align:center;padding:40px">
      <h1 class="rep-title" style="font-size:30px">${t('reportFor')}<br>${fmtMonth(M)}</h1>
      <div style="color:var(--green);font-weight:800;letter-spacing:2px;margin-top:8px">SAUDI FRIENDSHIP</div>
      <div style="color:var(--ink-soft);font-size:12px;letter-spacing:3px">HOSPITALITY · CULTURE · TOURISM</div>
    </div>
    <div class="rep-section"><h2 class="rep-title">${t('r_admin')}</h2><div class="rep-sub">${t('r_meetings')}</div>
      ${rTbl([t('f_date'),t('f_place'),t('f_entity'),t('f_meetType'),t('f_attendance'),t('f_hours'),t('f_details')],
        meetings.map(r=>[r.date,r.place,r.entity,r.meetType,r.attendance,r.hours,r.details]))}</div>
    <div class="rep-section"><h2 class="rep-title">${t('r_admin')}</h2><div class="rep-sub">${t('r_letters')}</div>
      ${rTbl([t('f_date'),t('f_letterCat'),t('f_letterDetail'),t('f_entity')],
        letters.map(r=>[r.date,r.letterCat,r.letterDetail,r.entity]))}</div>
    <div class="rep-section"><h2 class="rep-title">${t('r_comm')}</h2><div class="rep-sub">${t('r_commLocal')}</div>
      ${rTbl([t('f_date'),t('f_recipient'),t('f_count'),t('f_channel'),t('f_details')],
        commLocal.map(r=>[r.date,r.recipient,r.count,(Array.isArray(r.channel)?r.channel.join(', '):r.channel),r.notes]))}</div>
    <div class="rep-section"><h2 class="rep-title">${t('r_comm')}</h2><div class="rep-sub">${t('r_commIntl')}</div>
      ${rTbl([t('f_date'),t('f_recipient'),t('f_count'),t('f_channel')],
        commIntl.map(r=>[r.date,r.recipient,r.count,(Array.isArray(r.channel)?r.channel.join(', '):r.channel)]))}</div>
    <div class="rep-section"><h2 class="rep-title">${t('r_media')}</h2>
      ${rTbl([t('f_date'),t('f_platform'),t('f_posts')],media.map(r=>[r.date,r.platform,r.posts]))}</div>
    <div class="rep-section"><h2 class="rep-title">${t('r_fin')}</h2><div class="rep-sub">${t('r_grants')}</div>
      ${rTbl([t('f_date'),t('f_projName'),t('f_forEntity')],grants.map(r=>[r.date,r.projName,r.forEntity]))}
      <div class="rep-sub" style="margin-top:22px">${t('r_partners')}</div>

/* ---------------- EXPORT ---------------- */
function csvEscape(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCsv(tbl){
  const rows=inMonth(DB.all(tbl)); const sec=SECTIONS[tbl]; const keys=sec.fields.map(f=>f.k);
  const lines=[keys.map(k=>colLabel(tbl,k)).map(csvEscape).join(',')];
  rows.forEach(r=>lines.push(keys.map(k=>csvEscape(Array.isArray(r[k])?r[k].join(' | '):r[k])).join(',')));
  const blob=new Blob(["\uFEFF"+lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`SFC_${tbl}${CURRENT_MONTH?'_'+CURRENT_MONTH:''}.csv`;a.click();
}
